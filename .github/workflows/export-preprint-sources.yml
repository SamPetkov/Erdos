name: Export preprint sources for local rewrite

on:
  push:
    branches:
      - chatgpt/rewrite-preprints-20260720
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Assemble source package
        run: |
          mkdir -p export/arxiv_preprints/arxiv_593 export/arxiv_preprints/arxiv_625
          cp arxiv_preprints/Erdos593_revised.tex export/arxiv_preprints/
          cp arxiv_preprints/Erdos625_revised.tex export/arxiv_preprints/
          cp arxiv_preprints/arxiv_593/main.bbl export/arxiv_preprints/arxiv_593/
          cp arxiv_preprints/arxiv_593/references.bib export/arxiv_preprints/arxiv_593/
          cp arxiv_preprints/arxiv_625/main.bbl export/arxiv_preprints/arxiv_625/
          cp arxiv_preprints/arxiv_625/references.bib export/arxiv_preprints/arxiv_625/
      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: erdos-preprint-sources
          path: export
          if-no-files-found: error
          retention-days: 1
