name: Finalize 625 Section IX regime adapters

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/finalize-625-section9-regime-adapters.yml'
      - '625/formalization/Erdos625/Section9ResidualRegimeScaleAdapters.lean'
      - '625/formalization/ARISTOTLE_SECTION9_REGIME_ADAPTERS_2026-07-21.md'
  push:
    branches: [agent/625-section9-regime-adapters]
    paths:
      - '.github/workflows/finalize-625-section9-regime-adapters.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: agent/625-section9-regime-adapters
          fetch-depth: 0

      - name: Integrate reviewed source and remove quarantined projects
        run: |
          set -euo pipefail
          git rm -r aristotle_submissions/2026-07-21-section9-regime-adapters
          git rm .github/workflows/aristotle-625-section9-regime-adapters.yml
          git rm .github/workflows/lean-625-section9-regime-adapters.yml
          git rm .github/workflows/finalize-625-section9-regime-adapters.yml
          python3 - <<'PY'
          from pathlib import Path

          root = Path('625/formalization/Erdos625.lean')
          text = root.read_text(encoding='utf-8')
          new_import = 'import Erdos625.Section9ResidualRegimeScaleAdapters\n'
          anchor_import = 'import Erdos625.Section9ResidualAsymptoticArithmetic\n'
          if new_import not in text:
              if anchor_import not in text:
                  raise SystemExit('root import anchor not found')
              text = text.replace(anchor_import, anchor_import + new_import, 1)
              root.write_text(text, encoding='utf-8', newline='\n')

          ledger = Path('625/formalization/FORMALIZATION_LEDGER.md')
          text = ledger.read_text(encoding='utf-8')
          row = (
              '| `smallResidual_two_pow_le_exp_scale`, '
              '`canonicalDemandRawAttachmentTerm_le_smallResidualExpScale`, '
              '`eventually_log_growth_bounds`, '
              '`eventually_largeResidualEnvelope_logScale` | '
              '`Section9ResidualRegimeScaleAdapters.lean`; finite-to-asymptotic '
              'residual-regime adapters | proved | The faithful small-residual '
              'power `2^(U*m/2)` is transported to an exact `ENNReal.ofReal '
              '(exp(O(n/L^5)))` bound and then to one canonical raw attachment '
              'term while retaining its reward and incidence factors.  Separately, '
              'fixed-power logarithmic growth gives eventual `(log n)^2 <= n` '
              'and `(log n)^28 <= n^3`, which specialize the accepted finite '
              'large-residual arithmetic envelope to `O((log n)^8)`.  No skeleton '
              'sum, uniform attachment expectation, Lemma 9.1, Proposition 9.2, '
              'or final theorem follows. |\n'
          )
          anchor = (
              '| `eventually_tau_lt_one_third`, `exists_uniform_twoRegime_error` | '
              '`Section9AttachmentAsymptotics.lean`; analytic attachment bridges |'
          )
          if row not in text:
              pos = text.find(anchor)
              if pos < 0:
                  raise SystemExit('ledger anchor not found')
              end = text.find('\n', pos)
              if end < 0:
                  raise SystemExit('ledger anchor line has no terminator')
              text = text[:end + 1] + row + text[end + 1:]
              ledger.write_text(text, encoding='utf-8', newline='\n')
          PY

      - name: Reject placeholders, project axioms, and unsafe source
        run: |
          set -euo pipefail
          if grep -RInE --include='*.lean' \
            '(^|[[:space:]])(sorry|admit|sorryAx)([[:space:][:punct:]]|$)|^[[:space:]]*(axiom|constant|unsafe)[[:space:]]' \
            625/formalization; then
            exit 1
          fi
          ! grep -RInE --include='*.lean' \
            'native_decide|set_option[[:space:]]+maxHeartbeats[[:space:]]+0|grind[[:space:]]+\+suggestions' \
            625/formalization/Erdos625/Section9ResidualRegimeScaleAdapters.lean

      - name: Install Lean 4.31 and fetch the pinned Mathlib cache
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" toolchain install leanprover/lean4:v4.31.0
          cd 625/formalization
          "$HOME/.elan/bin/lake" update
          "$HOME/.elan/bin/lake" exe cache get

      - name: Replay the new module warning-fatally
        working-directory: 625/formalization
        run: |
          set -euo pipefail
          lake build --wfail Erdos625.Section9ResidualRegimeScaleAdapters

      - name: Build the integrated project warning-fatally
        working-directory: 625/formalization
        run: |
          set -euo pipefail
          lake build --wfail

      - name: Regenerate and compile the self-contained checkpoint
        working-directory: 625/formalization
        run: |
          set -euo pipefail
          python3 scripts/generate_self_contained.py
          mkdir -p .lake/build/lib/lean
          lake env lean -DwarningAsError=true Erdos625SelfContained.lean \
            -o .lake/build/lib/lean/Erdos625SelfContained.olean
          python3 scripts/generate_self_contained.py --check

      - name: Record passed acceptance gates
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path('625/formalization/ARISTOTLE_SECTION9_REGIME_ADAPTERS_2026-07-21.md')
          text = path.read_text(encoding='utf-8')
          marker = '<!-- ACCEPTANCE_STATUS -->\n'
          start = text.find(marker)
          if start < 0:
              raise SystemExit('audit acceptance marker not found')
          replacement = (
              marker
              + 'All acceptance gates passed in GitHub Actions run `'
              + os.environ['GITHUB_RUN_ID']
              + '`: exact statement review, source/trust scan, warning-fatal '
                'Lean 4.31 module replay, full `lake build --wfail`, root-import '
                'and ledger integration, deterministic self-contained regeneration, '
                'warning-fatal self-contained compilation, and standard-axiom output.\n'
          )
          prefix = text[:start]
          path.write_text(prefix + replacement, encoding='utf-8', newline='\n')
          PY

      - name: Commit the validated integration
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Accept Section IX residual-regime scale adapters'
          git push origin HEAD:agent/625-section9-regime-adapters
