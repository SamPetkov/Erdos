name: Finalize Aristotle 625 asymptotic leaves

on:
  push:
    branches: [agent/aristotle-625-asymptotic-leaves]
    paths:
      - '625/formalization/Erdos625/Section9ResidualAsymptoticArithmetic.lean'
      - '625/formalization/ARISTOTLE_SECTION9_ASYMPTOTIC_LEAVES_2026-07-21.md'
      - '.github/workflows/aristotle-625-asymptotic-leaves.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aristotle-625-asymptotic-leaves
          fetch-depth: 0

      - name: Remove one-hole submission projects and integrate the accepted module
        run: |
          set -euo pipefail
          git rm -r 625/formalization/aristotle_submissions/2026-07-21
          git rm .github/workflows/aristotle-625-asymptotic-leaves.yml
          python3 - <<'PY'
          from pathlib import Path

          root = Path('625/formalization/Erdos625.lean')
          text = root.read_text(encoding='utf-8')
          line = 'import Erdos625.Section9ResidualAsymptoticArithmetic\n'
          anchor = 'import Erdos625.Section9AttachmentAsymptotics\n'
          if line not in text:
              if anchor not in text:
                  raise SystemExit('Section IX import anchor not found')
              text = text.replace(anchor, anchor + line, 1)
              root.write_text(text, encoding='utf-8', newline='\n')
          PY

      - name: Reject placeholders, project axioms, and unsafe source
        run: |
          set -euo pipefail
          if grep -RInE --include='*.lean' \
            '(^|[[:space:]])(sorry|admit|sorryAx)([[:space:][:punct:]]|$)|^[[:space:]]*(axiom|constant|unsafe)[[:space:]]' \
            625/formalization; then
            exit 1
          fi
          ! grep -RInE --include='*.lean' \
            'native_decide|set_option[[:space:]]+maxHeartbeats[[:space:]]+0|grind[[:space:]]+\+suggestions' \
            625/formalization/Erdos625/Section9ResidualAsymptoticArithmetic.lean

      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          lake-package-directory: 625/formalization
          auto-config: false
          build: true
          build-args: --wfail
          use-mathlib-cache: true
          use-github-cache: false
          nanoda: false

      - name: Compile the accepted module warning-fatally
        working-directory: 625/formalization
        run: |
          set -euo pipefail
          lake env lean -DwarningAsError=true \
            Erdos625/Section9ResidualAsymptoticArithmetic.lean

      - name: Regenerate and compile the self-contained proof
        working-directory: 625/formalization
        run: |
          set -euo pipefail
          python3 scripts/generate_self_contained.py
          mkdir -p .lake/build/lib/lean
          lake env lean -DwarningAsError=true Erdos625SelfContained.lean \
            -o .lake/build/lib/lean/Erdos625SelfContained.olean
          python3 scripts/generate_self_contained.py --check

      - name: Commit the validated integration
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Accept three Aristotle-checked Section IX arithmetic leaves'
          git push origin HEAD:agent/aristotle-625-asymptotic-leaves
