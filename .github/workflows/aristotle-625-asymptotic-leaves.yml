name: Aristotle 625 asymptotic leaves

on:
  pull_request:
    branches: [main]
    paths:
      - '625/formalization/aristotle_submissions/2026-07-21/**'
      - '.github/workflows/aristotle-625-asymptotic-leaves.yml'
  push:
    branches: [agent/aristotle-625-asymptotic-leaves]
    paths:
      - '625/formalization/aristotle_submissions/2026-07-21/**'
      - '.github/workflows/aristotle-625-asymptotic-leaves.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  submit:
    name: ${{ matrix.id }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: small-residual-exponent
            project: 625/formalization/aristotle_submissions/2026-07-21/small_residual_exponent
            source: AristotleSmallResidualExponent/Main.lean
            target: smallResidualExponent_bound
          - id: ennreal-two-pow-bridge
            project: 625/formalization/aristotle_submissions/2026-07-21/ennreal_two_pow_bridge
            source: AristotleENNRealTwoPowBridge/Main.lean
            target: ennreal_two_pow_nat_le_of_log_bound
          - id: large-residual-envelope
            project: 625/formalization/aristotle_submissions/2026-07-21/large_residual_envelope
            source: AristotleLargeResidualEnvelope/Main.lean
            target: largeResidualEnvelope_bound
    env:
      ARISTOTLE_API_KEY: ${{ secrets.ARISTOTLE_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Reject malformed or overpowered task skeletons
        working-directory: ${{ matrix.project }}
        run: |
          set -euo pipefail
          test "$(grep -R --include='*.lean' -Ec '^[[:space:]]*sorry[[:space:]]*$' . | awk -F: '{s += $2} END {print s + 0}')" = 1
          ! grep -REn --include='*.lean' \
            '(^|[[:space:]])(admit|axiom|unsafe|native_decide)([[:space:]]|$)|set_option[[:space:]]+maxHeartbeats[[:space:]]+0|grind[[:space:]]+\+suggestions' .

      - name: Set up the pinned Aristotle Lean toolchain
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: ${{ matrix.project }}
          auto-config: false
          use-mathlib-cache: true

      - name: Elaborate the one-hole project locally
        working-directory: ${{ matrix.project }}
        run: |
          set -euo pipefail
          lake update
          lake exe cache get
          lake env lean "${{ matrix.source }}"

      - name: Require a securely configured Aristotle key
        run: |
          set -euo pipefail
          if [ -z "${ARISTOTLE_API_KEY:-}" ]; then
            echo '::error::Repository secret ARISTOTLE_API_KEY is not configured. Add a temporary Aristotle key as a GitHub Actions secret; do not put it in the repository or PR.'
            exit 3
          fi

      - name: Install the official Aristotle client
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check 'aristotlelib==2.1.0'
          aristotle --version

      - name: Submit the isolated theorem
        env:
          PROJECT: ${{ matrix.project }}
          TARGET: ${{ matrix.target }}
          OUTPUT: ${{ runner.temp }}/aristotle-${{ matrix.id }}.tar.gz
        run: |
          set -euo pipefail
          prompt="Prove the named Lean theorem ${TARGET} without changing its statement, hypotheses, conclusion, or quantifier order. Do not weaken the conclusion or add assumptions. Do not use sorry, admit, new axioms, unsafe declarations, native_decide, set_option maxHeartbeats 0, or grind +suggestions. Preserve the pinned project dependencies. Private helper lemmas are allowed only when logically necessary. Return the smallest checked patch."
          aristotle submit "$prompt" \
            --project-dir "$PROJECT" \
            --wait \
            --destination "$OUTPUT"

      - name: Upload quarantined Aristotle return
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aristotle-${{ matrix.id }}
          path: ${{ runner.temp }}/aristotle-${{ matrix.id }}.tar.gz
          if-no-files-found: warn
          retention-days: 30
