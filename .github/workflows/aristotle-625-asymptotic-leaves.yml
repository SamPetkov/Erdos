name: Aristotle 625 large-residual retry

on:
  push:
    branches: [agent/aristotle-625-asymptotic-leaves]
    paths:
      - '625/formalization/aristotle_submissions/2026-07-21/large_residual_envelope/**'
      - '.github/workflows/aristotle-625-asymptotic-leaves.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retry-large-residual-envelope:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      ARISTOTLE_API_KEY: ${{ secrets.ARISTOTLE_API_KEY }}
      PROJECT: 625/formalization/aristotle_submissions/2026-07-21/large_residual_envelope
      SOURCE: AristotleLargeResidualEnvelope/Main.lean
      OUTPUT: ${{ runner.temp }}/aristotle-large-residual-envelope-retry.tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Validate the revised one-hole request
        working-directory: ${{ env.PROJECT }}
        run: |
          set -euo pipefail
          test "$(grep -R --include='*.lean' -Ec '^[[:space:]]*sorry[[:space:]]*$' . | awk -F: '{s += $2} END {print s + 0}')" = 1
          ! grep -REn --include='*.lean' \
            '(^|[[:space:]])(admit|axiom|unsafe|native_decide)([[:space:]]|$)|set_option[[:space:]]+maxHeartbeats[[:space:]]+0|grind[[:space:]]+\+suggestions' .

      - name: Install the pinned Aristotle Lean toolchain
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" toolchain install leanprover/lean4:v4.28.0

      - name: Elaborate the revised request locally
        working-directory: ${{ env.PROJECT }}
        run: |
          set -euo pipefail
          lake update
          lake exe cache get
          lake env lean "$SOURCE"

      - name: Require the encrypted Aristotle key
        run: |
          set -euo pipefail
          if [ -z "${ARISTOTLE_API_KEY:-}" ]; then
            echo '::error::ARISTOTLE_API_KEY is not configured.'
            exit 3
          fi

      - name: Install the official Aristotle client
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check 'aristotlelib==2.1.0'
          aristotle --version

      - name: Ask Aristotle for a Lean-4.31-portable replacement proof
        run: |
          set -euo pipefail
          prompt='Prove the named theorem largeResidualEnvelope_bound without changing any binder, hypothesis, conclusion, or quantifier order. This is a retry after a previous service proof compiled on Lean 4.28 but failed when ported to Lean 4.31. The failed proof used convert/calc around the third term and produced mismatched goals between 6*kappaQ*(H*U^3/m), 6*H*(kappaQ*U^3/m), and 12*kappaQ*C_U^2*L^8. Return a robust proof that avoids orientation-sensitive convert steps. Prefer explicit transitivity, ring normalization, field cancellation using hn.ne and hm0.ne, and termwise inequalities. Check every intermediate expression against the exact target. Do not use sorry, admit, new axioms, unsafe, native_decide, set_option maxHeartbeats 0, or grind +suggestions. Do not add assumptions or helper axioms. Return the smallest checked patch and include no change outside the target project.'
          aristotle submit "$prompt" \
            --project-dir "$PROJECT" \
            --wait \
            --destination "$OUTPUT"

      - name: Upload quarantined retry return
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aristotle-large-residual-envelope-retry
          path: ${{ env.OUTPUT }}
          if-no-files-found: warn
          retention-days: 30
