name: Aristotle 625 Section IX regime adapters

on:
  pull_request:
    branches: [main]
    paths:
      - 'aristotle_submissions/2026-07-21-section9-regime-adapters/**'
      - '.github/workflows/aristotle-625-section9-regime-adapters.yml'
  push:
    branches: [agent/625-section9-regime-adapters]
    paths:
      - 'aristotle_submissions/2026-07-21-section9-regime-adapters/**'
      - '.github/workflows/aristotle-625-section9-regime-adapters.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  submit:
    name: ${{ matrix.id }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: small-residual-scale
            project: aristotle_submissions/2026-07-21-section9-regime-adapters/small_residual_scale
            source: AristotleSmallResidualScale/Main.lean
            target: smallResidual_two_pow_le_exp_scale
          - id: logarithmic-growth
            project: aristotle_submissions/2026-07-21-section9-regime-adapters/log_growth
            source: AristotleLogGrowth/Main.lean
            target: eventually_log_growth_bounds
    env:
      ARISTOTLE_API_KEY: ${{ secrets.ARISTOTLE_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Reject malformed or overpowered task skeletons
        working-directory: ${{ matrix.project }}
        run: |
          set -euo pipefail
          test "$(grep -R --include='*.lean' -Ec '^[[:space:]]*sorry[[:space:]]*$' . | awk -F: '{s += $2} END {print s + 0}')" = 1
          ! grep -REn --include='*.lean' \
            '(^|[[:space:]])(admit|axiom|unsafe|native_decide)([[:space:]]|$)|set_option[[:space:]]+maxHeartbeats[[:space:]]+0|grind[[:space:]]+\+suggestions' .

      - name: Install the pinned Aristotle Lean toolchain
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" toolchain install leanprover/lean4:v4.28.0

      - name: Elaborate the one-hole project locally
        working-directory: ${{ matrix.project }}
        run: |
          set -euo pipefail
          lake update
          lake exe cache get
          lake env lean "${{ matrix.source }}"

      - name: Require the encrypted Aristotle key
        run: |
          set -euo pipefail
          test -n "${ARISTOTLE_API_KEY:-}"

      - name: Install the official Aristotle client
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-check 'aristotlelib==2.1.0' || \
            python -m pip install --disable-pip-version-check 'aristotlelib==2.1.0'
          aristotle --version

      - name: Submit the isolated theorem
        env:
          PROJECT: ${{ matrix.project }}
          TARGET: ${{ matrix.target }}
          OUTPUT: ${{ runner.temp }}/aristotle-${{ matrix.id }}.tar.gz
        run: |
          set -euo pipefail
          prompt="Prove the named Lean theorem ${TARGET} without changing its statement, binders, hypotheses, conclusion, or quantifier order. Preserve the supplied context lemmas exactly. Do not add assumptions or weaken the result. Do not use sorry, admit, new axioms, unsafe declarations, native_decide, set_option maxHeartbeats 0, or grind +suggestions. Prefer explicit inequalities and standard Mathlib asymptotic lemmas over brittle automation. Return the smallest checked patch and modify no file outside the target project."
          aristotle submit "$prompt" \
            --project-dir "$PROJECT" \
            --wait \
            --destination "$OUTPUT"

      - name: Upload quarantined Aristotle return
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aristotle-${{ matrix.id }}
          path: ${{ runner.temp }}/aristotle-${{ matrix.id }}.tar.gz
          if-no-files-found: warn
          retention-days: 30
