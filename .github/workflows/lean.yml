name: Lean

on:
  push:
    paths:
      - "625/formalization/**"
      - ".github/workflows/lean.yml"
  pull_request:
    paths:
      - "625/formalization/**"
      - ".github/workflows/lean.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Reject proof placeholders and project axioms
        shell: bash
        run: |
          if grep -RInE --include='*.lean' \
            '(^|[[:space:]])(sorry|admit|sorryAx)([[:space:][:punct:]]|$)|^[[:space:]]*(axiom|constant|unsafe)[[:space:]]' \
            625/formalization; then
            exit 1
          fi
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        with:
          lake-package-directory: 625/formalization
          auto-config: false
          build: true
          build-args: --wfail
          use-mathlib-cache: true
          use-github-cache: false
          nanoda: false
      - name: Check the generated self-contained proof is current
        working-directory: 625/formalization
        shell: bash
        run: python3 scripts/generate_self_contained.py --check
      - name: Compile the self-contained proof warning-fatally
        working-directory: 625/formalization
        shell: bash
        run: |
          mkdir -p .lake/build/lib/lean
          lake env lean -DwarningAsError=true Erdos625SelfContained.lean \
            -o .lake/build/lib/lean/Erdos625SelfContained.olean
