name: Lean

on:
  push:
    paths:
      - "625/formalization/**"
      - ".github/workflows/lean.yml"
  pull_request:
    paths:
      - "625/formalization/**"
      - ".github/workflows/lean.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Reject placeholders and project axioms in accepted source
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE --exclude-dir=aristotle_submissions --include='*.lean' \
            '(^|[[:space:]])(sorry|admit|sorryAx)([[:space:][:punct:]]|$)|^[[:space:]]*(axiom|constant|unsafe)[[:space:]]' \
            625/formalization; then
            exit 1
          fi
      - name: Install Lean 4.31 and fetch the pinned Mathlib cache
        shell: bash
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" toolchain install leanprover/lean4:v4.31.0
          cd 625/formalization
          "$HOME/.elan/bin/lake" update
          "$HOME/.elan/bin/lake" exe cache get
      - name: Compile the revised Section IX arithmetic module warning-fatally
        id: candidate
        continue-on-error: true
        working-directory: 625/formalization
        shell: bash
        run: |
          set -o pipefail
          lake env lean -DwarningAsError=true \
            Erdos625/Section9ResidualAsymptoticArithmetic.lean \
            2>&1 | tee section9-arithmetic-candidate.log
      - name: Upload Section IX candidate diagnostics
        if: steps.candidate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: section9-arithmetic-candidate-diagnostics
          path: 625/formalization/section9-arithmetic-candidate.log
          retention-days: 30
      - name: Stop after candidate failure
        if: steps.candidate.outcome == 'failure'
        run: exit 1
      - name: Build the accepted project warning-fatally
        working-directory: 625/formalization
        shell: bash
        run: lake build --wfail
      - name: Check the generated self-contained proof is current
        working-directory: 625/formalization
        shell: bash
        run: python3 scripts/generate_self_contained.py --check
      - name: Compile the self-contained proof warning-fatally
        working-directory: 625/formalization
        shell: bash
        run: |
          mkdir -p .lake/build/lib/lean
          lake env lean -DwarningAsError=true Erdos625SelfContained.lean \
            -o .lake/build/lib/lean/Erdos625SelfContained.olean
